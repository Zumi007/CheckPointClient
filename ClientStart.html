<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckPoint - Vizsgarendszer</title>
    <!-- Tailwind CSS a gyors és modern formázáshoz -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide ikonok -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-900 to-slate-900">

    <div class="max-w-md w-full glass-card rounded-3xl p-8 shadow-2xl text-center animate-fade-in">
        <!-- Logo / Ikon -->
        <div class="mb-8 inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-blue-600/20 border border-blue-500/30 text-blue-400">
            <i data-lucide="shield-check" class="w-10 h-10"></i>
        </div>

        <!-- Címek -->
        <h1 class="text-4xl font-extrabold mb-3 tracking-tight">
            Check<span class="gradient-text">Point</span>
        </h1>
        <p class="text-slate-400 font-light mb-8 leading-relaxed">
            Üdvözöljük a következő generációs vizsga- és számonkérő rendszerben. Jelentkezzen be a kitöltés megkezdéséhez.
        </p>

        <!-- Fő Link / Gomb -->
        <a href="https://blue-tree-0efd6a410.2.azurestaticapps.net/" 
           class="btn-hover block w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 px-6 rounded-2xl flex items-center justify-center gap-3 text-lg mb-6">
            <span>Belépés a vizsgafelületre</span>
            <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </a>

        <!-- Extra infó -->
        <div class="pt-8 border-t border-slate-700/50">
            <div class="flex items-center justify-center gap-6 text-slate-500">
                <div class="flex items-center gap-2 text-xs">
                    <i data-lucide="monitor" class="w-4 h-4"></i>
                    <span>Web-alapú</span>
                </div>
                <div class="flex items-center gap-2 text-xs">
                    <i data-lucide="lock" class="w-4 h-4"></i>
                    <span>Biztonságos</span>
                </div>
                <div class="flex items-center gap-2 text-xs">
                    <i data-lucide="zap" class="w-4 h-4"></i>
                    <span>Gyors</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Verzió jelzés -->
    <div class="fixed bottom-6 text-slate-600 text-xs font-medium">
        © 2026 CheckPoint System · v1.2.0
    </div>

    <script>
        // Lucide ikonok inicializálása
        lucide.createIcons();
    </script>
</body>
</html>
