<!DOCTYPE html>
<html lang="hu" data-bs-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheckPoint - Tanulói Felület</title>
    <base href="/" />
    <!-- Bootstrap 5.3 CSS a sötét mód támogatásához -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/app.css" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body class="bg-dark text-light">
    <div id="app">
        <!-- Betöltő animáció sötét háttérrel -->
        <div class="d-flex flex-column justify-content-center align-items-center" style="height: 100vh;">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
            <div class="mt-3 fw-bold">CheckPoint betöltése...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Váratlan hiba történt.
        <a href="" class="reload">Újratöltés</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Biztonságosabb ServiceWorker regisztráció
        if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
            navigator.serviceWorker.register('service-worker.js').catch(function (err) {
                console.warn('ServiceWorker regisztráció kihagyva vagy sikertelen: ', err);
            });
        } else {
            console.log('ServiceWorker nem támogatott ebben a környezetben.');
        }
    </script>
</body>

</html>
